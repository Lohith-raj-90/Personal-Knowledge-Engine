<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_1 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_1" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_1');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// Crystal Geometry (Icosahedron for a crystalline feel)
const geometry = new THREE.IcosahedronGeometry(1.5, 0);
const material = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0,
    roughness: 0.05,
    transmission: 0.9,
    thickness: 0.5,
    envMapIntensity: 1,
    clearcoat: 1,
    transparent: true,
    opacity: 0.8
});

const crystal = new THREE.Mesh(geometry, material);
scene.add(crystal);

// Wireframe overlay for data-look
const wireframe = new THREE.Mesh(
    geometry,
    new THREE.MeshBasicMaterial({ color: 0x4F9EFF, wireframe: true, transparent: true, opacity: 0.2 })
);
crystal.add(wireframe);

// Particles
const particlesCount = 800;
const positions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 10;
}
const particlesGeometry = new THREE.BufferGeometry();
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMaterial = new THREE.PointsMaterial({
    color: 0x4F9EFF,
    size: 0.02,
    transparent: true,
    opacity: 0.6
});
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// Lights
const mainLight = new THREE.PointLight(0x4F9EFF, 10);
mainLight.position.set(5, 5, 5);
scene.add(mainLight);

const violetLight = new THREE.PointLight(0xA78BFA, 8);
violetLight.position.set(-5, -5, 5);
scene.add(violetLight);

const ambientLight = new THREE.AmbientLight(0x020408, 0.5);
scene.add(ambientLight);

camera.position.z = 5;

let time = 0;
function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    
    crystal.rotation.y += 0.003;
    crystal.rotation.x += 0.001;
    
    // Sine wave bob
    crystal.position.y = Math.sin(time) * 0.15;
    
    // Rotate particles
    particles.rotation.y -= 0.001;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_1 -->
</body>
</html>
