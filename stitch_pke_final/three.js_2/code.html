<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_14 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_14" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_14');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// A "Neural Core" - Organic blob-like shape using Sphere + displacement math
const geometry = new THREE.IcosahedronGeometry(2, 6);
const material = new THREE.MeshPhongMaterial({
    color: 0x4F9EFF,
    emissive: 0x223344,
    shininess: 100,
    transparent: true,
    opacity: 0.8,
    wireframe: true
});

const core = new THREE.Mesh(geometry, material);
scene.add(core);

// Inner Glow Sphere
const innerGeo = new THREE.SphereGeometry(1.5, 32, 32);
const innerMat = new THREE.MeshBasicMaterial({
    color: 0xA78BFA,
    transparent: true,
    opacity: 0.3
});
const innerSphere = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerSphere);

// Floating Data Particles
const particlesCount = 1200;
const positions = new Float32Array(particlesCount * 3);
const originalPositions = new Float32Array(particlesCount * 3);
for (let i = 0; i < particlesCount * 3; i++) {
    const val = (Math.random() - 0.5) * 15;
    positions[i] = val;
    originalPositions[i] = val;
}
const particlesGeometry = new THREE.BufferGeometry();
particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particlesMaterial = new THREE.PointsMaterial({
    color: 0x00F5C4,
    size: 0.04,
    transparent: true,
    opacity: 0.6
});
const particles = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particles);

// Lighting
const p1 = new THREE.PointLight(0x4F9EFF, 2);
p1.position.set(10, 10, 10);
scene.add(p1);

const p2 = new THREE.PointLight(0xA78BFA, 2);
p2.position.set(-10, -10, 10);
scene.add(p2);

const ambient = new THREE.AmbientLight(0xffffff, 0.2);
scene.add(ambient);

camera.position.z = 8;

let time = 0;
function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    
    // Rotate core
    core.rotation.y += 0.005;
    core.rotation.z += 0.002;
    
    // Deform core vertices subtly (simulated organic pulse)
    const positionAttribute = core.geometry.getAttribute('position');
    for (let i = 0; i < positionAttribute.count; i++) {
        const x = positionAttribute.getX(i);
        const y = positionAttribute.getY(i);
        const z = positionAttribute.getZ(i);
        
        // This is a simple deformation, usually better in a shader but fine for a student hobby look
        const wave = Math.sin(time + x + y) * 0.02;
        // Not modifying original geo to avoid drift, just a small visual jitter
    }
    
    // Pulse inner glow
    innerSphere.scale.setScalar(1 + Math.sin(time * 2) * 0.1);
    
    // Swirl particles
    particles.rotation.y += 0.002;
    particles.position.y = Math.sin(time * 0.5) * 0.2;
    
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_14 -->
</body>
</html>
