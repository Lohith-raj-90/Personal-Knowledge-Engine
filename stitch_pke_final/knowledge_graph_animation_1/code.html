<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    </style>
</head>
<body>
    <div id="graph-container" style="width:100%;height:100%"></div>
    <script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
    <script>
    (function() {
        const container = document.getElementById('graph-container');
        const width = container.clientWidth || window.innerWidth;
        const height = container.clientHeight || window.innerHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Materials
        const nodeMaterial = new THREE.MeshPhongMaterial({ color: 0x4F9EFF, emissive: 0x4F9EFF, emissiveIntensity: 0.5 });
        const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x4F9EFF, transparent: true, opacity: 0.2 });
        const coreMaterial = new THREE.MeshPhongMaterial({ color: 0xA78BFA, emissive: 0xA78BFA, emissiveIntensity: 0.8 });

        // Create Nodes
        const nodes = [];
        const nodeGroup = new THREE.Group();
        const numNodes = 24;
        
        // Central Core
        const coreGeom = new THREE.SphereGeometry(0.5, 32, 32);
        const core = new THREE.Mesh(coreGeom, coreMaterial);
        nodeGroup.add(core);

        for (let i = 0; i < numNodes; i++) {
            const geom = new THREE.SphereGeometry(0.12, 16, 16);
            const node = new THREE.Mesh(geom, nodeMaterial);
            
            const phi = Math.acos(-1 + (2 * i) / numNodes);
            const theta = Math.sqrt(numNodes * Math.PI) * phi;
            
            const radius = 3 + Math.random() * 0.5;
            node.position.set(
                radius * Math.cos(theta) * Math.sin(phi),
                radius * Math.sin(theta) * Math.sin(phi),
                radius * Math.cos(phi)
            );
            
            nodes.push(node);
            nodeGroup.add(node);

            // Lines to core
            const points = [node.position, new THREE.Vector3(0,0,0)];
            const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(lineGeom, edgeMaterial);
            nodeGroup.add(line);
        }
        scene.add(nodeGroup);

        // Particles
        const particlesCount = 1000;
        const posArr = new Float32Array(particlesCount * 3);
        for(let i=0; i<particlesCount*3; i++) {
            posArr[i] = (Math.random() - 0.5) * 15;
        }
        const partGeom = new THREE.BufferGeometry();
        partGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        const partMat = new THREE.PointsMaterial({ color: 0x4F9EFF, size: 0.015, transparent: true, opacity: 0.4 });
        const partField = new THREE.Points(partGeom, partMat);
        scene.add(partField);

        // Lights
        const light1 = new THREE.PointLight(0x4F9EFF, 5);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        const light2 = new THREE.PointLight(0xA78BFA, 5);
        light2.position.set(-5, -5, 5);
        scene.add(light2);
        scene.add(new THREE.AmbientLight(0xffffff, 0.1));

        camera.position.z = 8;

        function animate() {
            requestAnimationFrame(animate);
            nodeGroup.rotation.y += 0.0015;
            nodeGroup.rotation.x += 0.0005;
            partField.rotation.y -= 0.0005;
            
            // Pulse core
            const scale = 1 + Math.sin(Date.now() * 0.002) * 0.05;
            core.scale.set(scale, scale, scale);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const w = container.clientWidth || window.innerWidth;
            const h = container.clientHeight || window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        animate();
    })();
    </script>
</body>
</html>
